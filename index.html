<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>we were in New York of course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #d4d0c8;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    min-height: 100svh;
  }

  .container {
    max-width: 42rem;
    width: 100%;
    text-align: left;
  }

  .quote {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: clamp(1.4rem, 3.2vw, 2rem);
    line-height: 1.55;
    letter-spacing: 0.01em;
    color: #e8e4dc;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .quote.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .source {
    margin-top: 2rem;
    font-weight: 300;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #5a5650;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s;
  }

  .source.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .source span {
    display: block;
    margin-top: 0.25rem;
    text-transform: none;
    letter-spacing: 0.02em;
    font-style: italic;
    color: #444039;
  }

  .hint {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #2a2825;
    transition: opacity 0.4s ease;
  }

  @media (max-width: 600px) {
    body { padding: 1.5rem; }
    .source { margin-top: 1.5rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="quote" id="quote"></div>
  <div class="source" id="source"></div>
</div>
<div class="hint">tap for another</div>

<script>
  let highlights = [];

  function formatAuthor(raw) {
    if (!raw) return '';
    return raw
      .split(';')
      .map(a => {
        const parts = a.trim().split(',').map(s => s.trim());
        return parts.length === 2 ? `${parts[1]} ${parts[0]}` : a.trim();
      })
      .join(' & ');
  }

  function show(h) {
    const quoteEl = document.getElementById('quote');
    const sourceEl = document.getElementById('source');

    quoteEl.classList.remove('visible');
    sourceEl.classList.remove('visible');

    setTimeout(() => {
      quoteEl.textContent = h.text;
      sourceEl.innerHTML = formatAuthor(h.author)
        + '<span>' + h.book + '</span>';
      quoteEl.classList.add('visible');
      sourceEl.classList.add('visible');
    }, 350);
  }

  function random() {
    if (!highlights.length) return;
    show(highlights[Math.floor(Math.random() * highlights.length)]);
  }

  document.body.addEventListener('click', random);
  document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); random(); }
  });

  fetch('highlights.json')
    .then(r => r.json())
    .then(data => { highlights = data; random(); })
    .catch(() => {
      document.getElementById('quote').textContent = 'Could not load highlights.';
      document.getElementById('quote').classList.add('visible');
    });
</script>

</body>
</html>

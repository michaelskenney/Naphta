<html lang="en">

  <title>We Were in New York City, of course</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

</head>
<body>

    src="https://raw.githubusercontent.com/michaelskenney/naphta/main/IMG_7884.jpg"
